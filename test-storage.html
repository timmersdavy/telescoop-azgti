<!DOCTYPE html>
<html>
<head><title>Test localStorage</title></head>
<body style="background:#1a1f3a; color:#e8e8e8; font-family: monospace; padding: 20px;">
<h2>📊 LocalStorage Check</h2>
<pre id="result"></pre>
<script>
const obs = JSON.parse(localStorage.getItem('telescopeObservations') || '[]');
document.getElementById('result').textContent = 
  'Totaal waarnemingen: ' + obs.length + '\n\n' +
  'Gegevens:\n' +
  JSON.stringify(obs, null, 2);
</script>
</body>
</html>
